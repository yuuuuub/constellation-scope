<html lang="zh-CN">
<head>

<style>
/* ========== CSS Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0a0a1a;
  --bg-card: rgba(15, 15, 40, 0.85);
  --bg-card-hover: rgba(20, 20, 55, 0.9);
  --text-primary: #e0e0f0;
  --text-secondary: #a0a0c0;
  --text-muted: #6868a0;
  --accent-gold: #f0c060;
  --accent-purple: #a070e0;
  --accent-blue: #6090e0;
  --accent-pink: #e070a0;
  --accent-red: #e06060;
  --accent-green: #60c080;
  --star-color: #f0d050;
  --border: rgba(255, 255, 255, 0.08);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ========== Animated Star Background ========== */
.stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

/* ========== Layout ========== */
.container { max-width: 800px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

/* ========== Header ========== */
.header { text-align: center; padding: 40px 0 20px; }
.header h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; letter-spacing: 2px; }
.header .subtitle { color: var(--text-secondary); font-size: 0.95rem; letter-spacing: 3px; }
.header .date-display { margin-top: 10px; font-size: 0.85rem; color: var(--text-muted); }

/* ========== Sign Grid ========== */
.sign-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 24px 0; }
@media (max-width: 600px) { .sign-grid { grid-template-columns: repeat(3, 1fr); } }
.sign-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 6px;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
  user-select: none;
}
.sign-btn:hover { background: var(--bg-card-hover); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(160, 112, 224, 0.15); }
.sign-btn.active { background: linear-gradient(135deg, rgba(160,112,224,0.25), rgba(96,144,224,0.25)); border-color: var(--accent-purple); color: #fff; font-weight: 600; box-shadow: 0 0 20px rgba(160,112,224,0.2); }
.sign-btn .sign-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }
.sign-btn .sign-name { font-size: 0.78rem; }

/* ========== Cards ========== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.card-header .big-icon { font-size: 2.6rem; }
.card-header h2 { font-size: 1.4rem; font-weight: 700; color: #fff; }
.card-header .date-range { color: var(--text-muted); font-size: 0.8rem; }

/* ========== Star Ratings ========== */
.rating-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.rating-row:last-child { border-bottom: none; }
.rating-label { font-size: 0.9rem; color: var(--text-secondary); min-width: 70px; }
.rating-stars { display: flex; gap: 3px; font-size: 1.1rem; }
.rating-stars .star { color: #333; transition: color 0.3s; }
.rating-stars .star.filled { color: var(--star-color); }
.rating-score { font-size: 0.85rem; color: var(--text-muted); width: 30px; text-align: right; }
.rating-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin: 0 12px; overflow: hidden; }
.rating-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* ========== Lucky Section ========== */
.lucky-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
.lucky-item { text-align: center; padding: 12px 8px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); }
.lucky-item .lucky-icon { font-size: 1.4rem; margin-bottom: 4px; }
.lucky-item .lucky-label { font-size: 0.75rem; color: var(--text-muted); }
.lucky-item .lucky-value { font-size: 0.95rem; color: #fff; font-weight: 600; margin-top: 2px; }

/* ========== Fortune Text ========== */
.fortune-text { margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border-left: 3px solid var(--accent-purple); }
.fortune-text p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.8; }
.fortune-text p + p { margin-top: 8px; }

/* ========== Tabs ========== */
.tabs { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 16px; }
.tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 8px; font-size: 0.9rem; transition: var(--transition); font-weight: 500; }
.tab-btn.active { background: rgba(160,112,224,0.2); color: #fff; font-weight: 600; }
.tab-btn:hover { color: var(--text-secondary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ========== Weekly / Monthly Day Cards ========== */
.day-list { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
@media (max-width: 600px) { .day-list { grid-template-columns: repeat(4, 1fr); } }
.day-card { text-align: center; padding: 8px 4px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); font-size: 0.75rem; }
.day-card .day-date { color: var(--text-muted); font-size: 0.7rem; }
.day-card .day-score { font-size: 0.85rem; font-weight: 700; color: var(--accent-gold); margin-top: 4px; }
.day-card.today { border: 1px solid var(--accent-purple); background: rgba(160,112,224,0.1); }
.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
@media (max-width: 600px) { .month-grid { grid-template-columns: repeat(5, 1fr); } }
.month-day { text-align: center; padding: 6px 2px; background: rgba(255,255,255,0.02); border-radius: 6px; font-size: 0.7rem; }
.month-day .md-emoji { font-size: 1rem; display: block; margin-bottom: 1px; }
.month-day .md-date { color: var(--text-muted); }
.month-day.today { border: 1px solid var(--accent-purple); background: rgba(160,112,224,0.1); }

/* ========== Compatibility ========== */
.compat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 12px; }
.compat-cell { text-align: center; padding: 6px 2px; background: rgba(255,255,255,0.03); border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: var(--transition); }
.compat-cell:hover { background: rgba(160,112,224,0.15); }
.compat-cell .comp-icon { font-size: 1.1rem; display: block; }
.compat-cell .comp-score { color: var(--accent-gold); font-weight: 700; margin-top: 2px; }
.compat-detail { margin-top: 12px; padding: 14px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); }
.compat-detail h3 { color: var(--accent-gold); margin-bottom: 8px; font-size: 0.95rem; }
.compat-detail p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.8; }

/* ========== Personality ========== */
.personality-section { margin-top: 16px; }
.personality-section .trait-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
@media (max-width: 400px) { .personality-section .trait-grid { grid-template-columns: 1fr; } }
.personality-section .trait-item { padding: 12px; background: rgba(255,255,255,0.03); border-radius: var(--radius-sm); }
.personality-section .trait-item h3 { font-size: 0.85rem; color: var(--accent-purple); margin-bottom: 4px; }
.personality-section .trait-item p { font-size: 0.8rem; color: var(--text-secondary); }
.personality-section .element-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin: 6px 4px 6px 0; }
.personality-section .element-badge.fire { background: rgba(240,96,96,0.2); color: #f08080; }
.personality-section .element-badge.earth { background: rgba(96,160,96,0.2); color: #80c080; }
.personality-section .element-badge.air { background: rgba(96,144,240,0.2); color: #80a0f0; }
.personality-section .element-badge.water { background: rgba(96,96,240,0.2); color: #8080f0; }

/* ========== Chinese Zodiac ========== */
.cn-zodiac { text-align: center; padding: 16px; }
.cn-zodiac .cn-animal { font-size: 3rem; display: block; margin-bottom: 6px; }
.cn-zodiac .cn-name { font-size: 1.1rem; color: #fff; font-weight: 600; }
.cn-zodiac .cn-year { color: var(--text-muted); font-size: 0.85rem; }

/* ========== History ========== */
.history-list { max-height: 300px; overflow-y: auto; }
.history-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; transition: var(--transition); }
.history-item:hover { background: rgba(160,112,224,0.1); }
.history-item .hi-icon { font-size: 1.3rem; }
.history-item .hi-info { flex: 1; font-size: 0.8rem; }
.history-item .hi-date { color: var(--text-muted); font-size: 0.75rem; }
.history-item .hi-score { color: var(--accent-gold); font-weight: 700; }

/* ========== Footer ========== */
.footer { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.75rem; }

/* ========== Section Title ========== */
.section-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title .st-icon { font-size: 1.2rem; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ========== Animations ========== */
@keyframes twinkle { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeInUp 0.5s ease forwards; }
</style>
</head>

// ============ UTILITIES ============
function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash |= 0;
  }
  return Math.abs(hash);
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getMonthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function seedRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function getDaySeed(signId, dateOffset) {
  const d = new Date();
  d.setDate(d.getDate() + dateOffset);
  const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return hashCode(ds + ZODIAC_DATA[signId].latin);
}

function getMonthSeed(signId) {
  const d = new Date();
  const ms = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  return hashCode(ms + ZODIAC_DATA[signId].latin);
}

function seededRating(rand, min, max) {
  return Math.floor(rand() * (max - min + 1)) + min;
}

// ============ RENDER FUNCTIONS ============

function getCategoryColor(category) {

function renderDaily() {

  const pools = ['overall', 'love', 'career', 'wealth', 'health'];
  const ratings = categories.map(() => seededRating(rand, 2, 5));

  // Ensure overall is slightly higher
  ratings[0] = Math.min(5, Math.max(3, ratings[0]));

  // Ratings HTML
  const ratingsHTML = categories.map((cat, i) =>
    renderRatingRow(cat, ratings[i], getCategoryColor(cat))
  ).join('');
  document.getElementById('dailyRatings').innerHTML = ratingsHTML;

  // Lucky section
  const colorIdx = Math.floor(rand() * ALL_COLORS.length);
  const numIdx = Math.floor(rand() * sign.numbers.length);
  const dirIdx = Math.floor(rand() * ALL_DIRECTIONS.length);

  document.getElementById('luckySection').innerHTML = `

    <p>💖 <strong>爱情运势：</strong>${fortunes[1].text}</p>

function renderWeekly() {
  const sign = ZODIAC_DATA[currentSignId];
  const today = new Date();
  const dayOfWeek = today.getDay();
  const startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - ((dayOfWeek + 6) % 7)); // Monday start

  const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(startOfWeek);
    d.setDate(startOfWeek.getDate() + i);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    const seed = getDaySeed(currentSignId, i - ((dayOfWeek + 6) % 7));
    const rand = seedRandom(seed);
    const score = seededRating(rand, 50, 98);
    const isToday = d.toDateString() === today.toDateString();

    html += `
      <div class="day-card ${isToday ? 'today' : ''}">
        <div class="day-date">${dayNames[i]}</div>
        <div class="day-date">${dateStr}</div>
        <div class="day-score">${score}分</div>
      </div>
    `;
  }
  document.getElementById('weekList').innerHTML = html;

  const weekSeed = getDaySeed(currentSignId, 0) + 1000;
  const wRand = seedRandom(weekSeed);
  const overallWScore = seededRating(wRand, 55, 95);
  document.getElementById('weeklySummary').innerHTML = `
    <p>📊 <strong>本周综合评分：${overallWScore}分</strong></p>
    <p>本周运势整体${overallWScore >= 80 ? '良好' : overallWScore >= 65 ? '平稳' : '需要注意'}。${
      overallWScore >= 80 ? '这周是你的幸运周，各方面都有不错的表现。积极行动，收获满满！' :
      overallWScore >= 65 ? '本周运势平稳，适合稳步推进各项计划。保持耐心，好的结果在路上。' :
      '本周可能会遇到一些挑战，但这也是成长的机会。保持乐观心态，一切都会好起来的。'
    }</p>
  `;
}

function renderMonthly() {
  const sign = ZODIAC_DATA[currentSignId];
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let html = '';
  const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

  // Day headers
  dayNames.forEach(d => { html += `<div class="month-day" style="color:var(--text-muted);font-weight:600;">${d}</div>`; });

  // Fill empty days before 1st
  const firstDay = new Date(year, month, 1).getDay();
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="month-day"></div>`;
  }

  const emojis = ['🌟','✨','💫','⭐','🌈','☀️','🌙','💎','🔥','❄️','🌺','🍀','🎯','💡','🎵','🏆','🎨','💖','🦋','🌻'];

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === todayDate.getDate();
    const seed = hashCode(`${year}-${month+1}-${d}-${sign.latin}`);
    const emojiIdx = seed % emojis.length;
    html += `
      <div class="month-day ${isToday ? 'today' : ''}">
        <span class="md-emoji">${emojis[emojiIdx]}</span>
        <span class="md-date">${d}</span>
      </div>
    `;
  }
  document.getElementById('monthGrid').innerHTML = html;

  const mSeed = getMonthSeed(currentSignId);
  const mRand = seedRandom(mSeed);
  const mColorIdx = Math.floor(mRand() * ALL_COLORS.length);
  const mDirIdx = Math.floor(mRand() * ALL_DIRECTIONS.length);
  const mNum = Math.floor(mRand() * 99) + 1;

  document.getElementById('monthlyLucky').innerHTML = `
    <div class="lucky-item">
      <div class="lucky-icon">🎨</div>
      <div class="lucky-label">本月幸运色</div>
      <div class="lucky-value" style="color:${ALL_COLORS[mColorIdx].hex}">${ALL_COLORS[mColorIdx].name}</div>
    </div>
    <div class="lucky-item">
      <div class="lucky-icon">🔢</div>
      <div class="lucky-label">本月幸运数</div>
      <div class="lucky-value">${mNum}</div>
    </div>
    <div class="lucky-item">
      <div class="lucky-icon">🧭</div>
      <div class="lucky-label">本月幸运方位</div>
      <div class="lucky-value">${ALL_DIRECTIONS[mDirIdx]}</div>

}

function renderCompatibility() {
  const sign = ZODIAC_DATA[currentSignId];
  const compat = sign.compat;
  const entries = Object.entries(compat);

  // Sort by score descending
  entries.sort((a, b) => b[1] - a[1]);

  document.getElementById('compatGrid').innerHTML = entries.map(([name, score]) => {
    const targetSign = ZODIAC_DATA.find(s => s.name === name);
    const level = score >= 85 ? 'high' : score >= 65 ? 'medium' : 'low';
    const heart = score >= 85 ? '❤️‍🔥' : score >= 70 ? '❤️' : score >= 55 ? '💛' : '💔';
    return `
      <div class="compat-cell" onclick="showCompatDetail('${name}', ${score})"
           style="${selectedCompatId === name ? 'border:1px solid var(--accent-purple);background:rgba(160,112,224,0.15);' : ''}">
        <span class="comp-icon">${targetSign ? targetSign.emoji : ''}</span>
        <span style="font-size:0.65rem;color:var(--text-muted);display:block;">${name}</span>
        <span class="comp-score">${heart} ${score}%</span>
      </div>
    `;
  }).join('');

  // Reset detail if not selected
  if (!selectedCompatId) {
    document.getElementById('compatTitle').textContent = '点击上方星座查看配对详情';
    document.getElementById('compatText').textContent = '';
  }
}

function showCompatDetail(targetName, score) {
  selectedCompatId = targetName;
  const sign = ZODIAC_DATA[currentSignId];
  const level = score >= 85 ? 'high' : score >= 65 ? 'medium' : 'low';
  const pool = COMPAT_DESCRIPTIONS[level];
  const idx = hashCode(sign.latin + targetName) % pool.length;
  let text = pool[idx];
  text = text.replace(/\{a\}/g, sign.name).replace(/\{b\}/g, targetName);

  document.getElementById('compatTitle').textContent = `${sign.name} ❤️ ${targetName} - 匹配度 ${score}%`;
  document.getElementById('compatText').textContent = text;
  renderCompatibility();
}

function renderChineseZodiac() {
  const year = todayDate.getFullYear();
  const idx = (year - 4) % 12; // 1900 is Rat year, 4 mod 12
  const animalStr = CN_ZODIAC[idx];
  const elementIdx = (year % 10) < 2 ? 0 : Math.floor(((year % 10) - 2) / 2);
  const element = CN_ELEMENTS[(Math.floor((year - 4) % 10 / 2) + 4) % 5]; // Simplified element calc

  // Simpler element mapping
  const yearElementMap = { 0: '金', 1: '金', 2: '水', 3: '水', 4: '木', 5: '木', 6: '火', 7: '火', 8: '土', 9: '土' };
  const yrElement = yearElementMap[year % 10];

  document.getElementById('cnAnimal').innerHTML = animalStr.split('🐭')[0] || animalStr;
  const animalOnly = animalStr.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').trim() || animalStr.slice(0, 2);
  document.getElementById('cnAnimal').textContent = animalStr.slice(-2) || animalStr;
  // Just show emoji

  document.getElementById('cnName').textContent = `${yrElement}${animalOnly}年`;

  // Current animal
  const animalCN = CN_ZODIAC[idx].replace(/[\u{1F000}-\u{1FFFF}]/gu, '').trim();
  document.getElementById('cnName').textContent = `${yrElement}${animalCN}年`;
  document.getElementById('cnYear').textContent = `公元 ${year} 年`;

  const fortune = CN_ZODIAC_FORTUNES.find(f => f.animal === animalCN);
  document.getElementById('cnFortune').textContent = fortune ? fortune.text : '今年运势总体向好，保持积极心态，好运自然来。';
}

function renderHistory() {
  const container = document.getElementById('historyList');
  try {
    const history = JSON.parse(localStorage.getItem('horoscope_history') || '[]');
    if (history.length === 0) {
      container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">暂无历史记录</p>';
      return;
    }

    container.innerHTML = history.slice(-20).reverse().map((h, i) => {
      const sign = ZODIAC_DATA[h.signId];
      return `
        <div class="history-item" onclick="selectSign(${h.signId})">
          <span class="hi-icon">${sign ? sign.emoji : '⭐'}</span>
          <div class="hi-info">
            <div>${sign ? sign.name : '未知'} · ${h.date}</div>
            <div style="color:var(--text-muted);">${h.summary || ''}</div>
          </div>
          <span class="hi-score">${h.overallScore || '?'}分</span>
        </div>
      `;
    }).join('');
  } catch {
    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">暂无历史记录</p>';
  }
}

function saveToHistory(ratings, fortunes) {
  try {
    const history = JSON.parse(localStorage.getItem('horoscope_history') || '[]');
    const sign = ZODIAC_DATA[currentSignId];
    const today = getTodayStr();

    // Remove duplicate for today
    const filtered = history.filter(h => !(h.date === today && h.signId === currentSignId));

    filtered.push({
      date: today,
      signId: currentSignId,
      signName: sign.name,
      overallScore: ratings[0],
      ratings: ratings,
      summary: fortunes[0].text.substring(0, 30) + '...'
    });

    // Keep last 50 entries
    while (filtered.length > 50) filtered.shift();
    localStorage.setItem('horoscope_history', JSON.stringify(filtered));
    renderHistory();
  } catch {}
}

function switchTab(period) {
  currentPeriod = period;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-period="${period}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

  switch(period) {
    case 'daily':
      document.getElementById('tabDaily').classList.add('active');
      const dailyData = renderDaily();
      saveToHistory(dailyData.ratings, dailyData.fortunes);
      break;
    case 'weekly':
      document.getElementById('tabWeekly').classList.add('active');
      renderWeekly();
      break;
    case 'monthly':
      document.getElementById('tabMonthly').classList.add('active');
      renderMonthly();
      break;
  }
}

// ============ STARS CANVAS ============
function initStars() {
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005,
      opacity: Math.random() * 0.5 + 0.3
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    stars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = 0.3 + Math.sin(s.twinkle) * 0.3 + 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,200,255,${alpha})`;
      ctx.fill();

      // Glow
      if (s.r > 1.2) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,180,255,${alpha * 0.15})`;
        ctx.fill();
      }
    });

    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

function init() {
  // Set date display
  const d = new Date();
  const weekNames = ['日', '一', '二', '三', '四', '五', '六'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${weekNames[d.getDay()]}`;

  // Detect zodiac sign based on date
  const md = d.getMonth() * 100 + d.getDate();
  const signRanges = [
    { id: 9, start: 1222, end: 1231 }, // Capricorn Dec 22-31
    { id: 9, start: 101, end: 119 },   // Capricorn Jan 1-19
    { id: 10, start: 120, end: 218 },  // Aquarius
    { id: 11, start: 219, end: 320 },  // Pisces
    { id: 0, start: 321, end: 419 },   // Aries
    { id: 1, start: 420, end: 520 },   // Taurus
    { id: 2, start: 521, end: 621 },   // Gemini
    { id: 3, start: 622, end: 722 },   // Cancer
    { id: 4, start: 723, end: 822 },   // Leo
    { id: 5, start: 823, end: 922 },   // Virgo
    { id: 6, start: 923, end: 1023 },  // Libra
    { id: 7, start: 1024, end: 1122 }, // Scorpio
    { id: 8, start: 1123, end: 1221 }, // Sagittarius
  ];

  for (const range of signRanges) {
    if ((md >= range.start && md <= range.end) ||
        (range.start > range.end && (md >= range.start || md <= range.end))) {
      currentSignId = range.id;
      break;
    }
  }

  // Tab listeners
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.period));
  });

  updateAll();
  initStars();
}

document.addEventListener('DOMContentLoaded', init);
